<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d7c66">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Genome">
    <title>Latent Surface | No-App OS</title>
    <link rel="stylesheet" href="index.css?v=mobilefix4">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
</head>

<body>
    <div id="latent-field"></div>
    <div id="history-reel"></div>
    <div id="reasoning-overlay"></div>

    <main>
        <div id="surface">
            <!-- The UIEngine will inject shards here -->
            <div id="ui-container" class="ui-shard">
                <div class="h1">Latent Surface</div>
                <div class="desc">The interface will holographically manifest upon your intent.</div>
                <div class="card shimmer"
                    style="height: 200px; display: flex; align-items: center; justify-content: center; opacity: 0.3;">
                    <span style="font-family: var(--font-mono); color: var(--text-muted);">AWAITING OBSERVER...</span>
                </div>
            </div>
        </div>

        <div id="command-bar">
            <div class="input-container">
                <div id="window-controls" class="window-controls">
                    <button class="wc-btn wc-close" id="wc-close" title="Close" type="button"></button>
                    <button class="wc-btn wc-minimize" id="wc-minimize" title="Minimize" type="button"></button>
                    <button class="wc-btn wc-maximize" id="wc-maximize" title="Maximize" type="button"></button>
                </div>
                <div class="input-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </svg>
                </div>
                <input type="text" id="intent-input" placeholder='Try: "add task Ship onboarding"' autocomplete="off"
                    autofocus>
            </div>
            <div class="status" id="status">PERSISTENCE: STABLE | ENTROPY: 0.02</div>
            <button class="sound-toggle" id="sound-toggle" title="Toggle sound (Alt+S)">♪</button>
        </div>
    </main>

    <script>
        window.addEventListener('error', function (event) {
            var existing = document.getElementById('genome-mobile-error');
            if (existing) existing.remove();
            var node = document.createElement('div');
            node.id = 'genome-mobile-error';
            node.style.cssText = 'position:fixed;left:12px;right:12px;top:12px;z-index:20000;padding:12px 14px;border-radius:14px;background:#3b1015;color:#fff;font:12px/1.45 monospace;box-shadow:0 12px 40px rgba(0,0,0,.35);white-space:pre-wrap;';
            node.textContent = 'Genome mobile boot error:\n' + String((event && (event.message || (event.error && event.error.message))) || 'unknown error');
            document.body.appendChild(node);
        });
        window.addEventListener('unhandledrejection', function (event) {
            var existing = document.getElementById('genome-mobile-error');
            if (existing) existing.remove();
            var node = document.createElement('div');
            node.id = 'genome-mobile-error';
            node.style.cssText = 'position:fixed;left:12px;right:12px;top:12px;z-index:20000;padding:12px 14px;border-radius:14px;background:#3b1015;color:#fff;font:12px/1.45 monospace;box-shadow:0 12px 40px rgba(0,0,0,.35);white-space:pre-wrap;';
            node.textContent = 'Genome mobile promise error:\n' + String((event && event.reason && (event.reason.message || event.reason)) || 'unknown rejection');
            document.body.appendChild(node);
        });
    </script>
    <script type="module" src="app.js?v=mobilefix4"></script>
</body>

</html>
